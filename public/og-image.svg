<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Subtle grid pattern for street/map feel -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3a4a5e" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <!-- Gradient for bottom fade -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3748" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1A202C" stop-opacity="1"/>
    </linearGradient>
    <!-- Orange glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F6AD55" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F6AD55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#2D3748"/>

  <!-- Grid overlay for map/street feel -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle glow behind icon -->
  <ellipse cx="200" cy="280" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Bottom gradient -->
  <rect y="400" width="1200" height="230" fill="url(#bottomFade)"/>

  <!-- Decorative street lines (subtle) -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#3a4a5e" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="522" x2="1200" y2="522" stroke="#F6AD55" stroke-width="1" opacity="0.2"/>

  <!-- Dashed center line like a road -->
  <line x1="0" y1="518" x2="1200" y2="518" stroke="#4a5a6e" stroke-width="1.5" stroke-dasharray="20,15" opacity="0.3"/>

  <!-- Broom icon (scaled up from favicon) -->
  <g transform="translate(110, 180) scale(3.2)">
    <!-- Angled broom - handle -->
    <line x1="50" y1="6" x2="28" y2="28" stroke="#F6AD55" stroke-width="6" stroke-linecap="round"/>
    <!-- Bristle collar -->
    <ellipse cx="26" cy="30" rx="8" ry="4" fill="#ED8936" transform="rotate(-45 26 30)"/>
    <!-- Bristles -->
    <line x1="26" y1="30" x2="8" y2="48" stroke="#FBD38D" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="26" y1="30" x2="12" y2="54" stroke="#FBD38D" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <line x1="26" y1="30" x2="20" y2="55" stroke="#FBD38D" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="26" y1="30" x2="5" y2="42" stroke="#FBD38D" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <line x1="26" y1="30" x2="28" y2="52" stroke="#FBD38D" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- "SweepTracker" main title -->
  <text x="380" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="#FFFFFF" letter-spacing="-1">
    Sweep<tspan fill="#F6AD55">Tracker</tspan>
  </text>

  <!-- Tagline -->
  <text x="385" y="320" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#A0AEC0" letter-spacing="0.5">
    Track NYC Street Sweepers in Real-Time
  </text>

  <!-- Feature pills -->
  <!-- Pill 1: Live Tracking -->
  <rect x="385" y="370" width="190" height="42" rx="21" fill="#2D3748" stroke="#4A5568" stroke-width="1.5"/>
  <circle cx="410" cy="391" r="6" fill="#22C55E"/>
  <text x="424" y="397" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#E2E8F0">Live Tracking</text>

  <!-- Pill 2: Sweep History -->
  <rect x="590" y="370" width="205" height="42" rx="21" fill="#2D3748" stroke="#4A5568" stroke-width="1.5"/>
  <circle cx="615" cy="391" r="6" fill="#3B82F6"/>
  <text x="629" y="397" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#E2E8F0">Sweep History</text>

  <!-- Pill 3: 100% Free -->
  <rect x="810" y="370" width="160" height="42" rx="21" fill="#2D3748" stroke="#4A5568" stroke-width="1.5"/>
  <circle cx="835" cy="391" r="6" fill="#F6AD55"/>
  <text x="849" y="397" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#E2E8F0">100% Free</text>

  <!-- URL at bottom -->
  <text x="600" y="580" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#F6AD55" text-anchor="middle" letter-spacing="2">
    sweeptracker.nyc
  </text>
</svg>
